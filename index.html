<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>野菜直売所 - クラウド同期版</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
  #adminBtn { position: absolute; top: 10px; right: 10px; padding: 8px 16px; cursor: pointer; }
  .item { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; background: white; border-radius: 8px; }
  .item img { width: 100px; height: 100px; object-fit: cover; margin-right: 20px; }
  .info { flex: 1; }
  .veg-name { font-size: 20px; font-weight: bold; }
  .price { font-size: 18px; color: #e67e22; }
  .qty { width: 60px; padding: 5px; font-size: 16px; }
  #total { font-size: 24px; margin-top: 20px; font-weight: bold; }
  #orderBtn { margin-top: 20px; padding: 12px 30px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 5px; }
  #adminPanel { display:none; border:2px solid #34495e; padding:20px; margin-top:20px; background:#ecf0f1; border-radius: 8px; }
  .drop-area { width: 100%; height: 60px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; background: #fff; cursor: pointer; margin: 10px 0; }
  .preview { width: 80px; height: 60px; object-fit: cover; display: none; margin-top: 5px; }
</style>

<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
</head>
<body>

<h1>野菜直売所</h1>
<button id="adminBtn">管理者メニュー</button>

<div id="userInterface">
  <label>お客様名：<input type="text" id="nameBox" placeholder="名前を入力"></label>
  <div id="items">読み込み中...</div>
  <div id="total">合計：0円</div>
  <button id="orderBtn">発注を確定する</button>
</div>

<div id="adminPanel">
  <h2>管理者用：商品管理</h2>
  <div style="background: #fff; padding: 15px; margin-bottom: 20px;">
    <h3>新規追加</h3>
    名前：<input type="text" id="newName"><br>
    価格：<input type="number" id="newPrice" style="width:80px">円<br>
    在庫：<input type="number" id="newStock" style="width:60px">個
    <div class="drop-area" id="dropNew">ここに画像をドロップ</div>
    <img id="previewNew" class="preview">
    <button id="addBtn" style="background:#3498db; color:white; border:none; padding:10px;">追加</button>
  </div>
  <h3>登録済みリスト</h3>
  <div id="editList"></div>
  <button id="closeAdminBtn">閉じる</button>
</div>

<script>
  // --- 1. あなた専用のFirebase設定（image_803b3c.pngから転記） ---
  const firebaseConfig = {
    apiKey: "AIzaSyCDdgxGhJLHApAmjwFnwQ9r3VwACr2nKY",
    authDomain: "taroyasaishop.firebaseapp.com",
    databaseURL: "https://taroyasaishop-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "taroyasaishop",
    storageBucket: "taroyasaishop.firebasestorage.app",
    messagingSenderId: "463273049238",
    appId: "1:463273049238:web:483b022de871b5f5a816b7",
    measurementId: "G-P953B34PT0"
  };

  // Firebase初期化
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let vegetables = [];

  // リアルタイム同期（データベースを見張る）
  db.ref("vegetables").on("value", (snapshot) => {
    const data = snapshot.val();
    vegetables = data || [];
    renderAll();
  });

  function saveData() {
    db.ref("vegetables").set(vegetables);
  }

  /* --- 画面表示ロジック --- */
  function renderAll() {
    const itemsDiv = document.getElementById("items");
    itemsDiv.innerHTML = "";
    vegetables.forEach((veg, index) => {
      itemsDiv.innerHTML += `
        <div class="item">
          <img src="${veg.image}">
          <div class="info">
            <div class="veg-name">${veg.name}</div>
            <div class="price">${veg.price}円</div>
            <div class="stock">在庫：${veg.stock}個</div>
            <input type="number" min="0" max="${veg.stock}" value="0" data-index="${index}" class="qty"> 個
          </div>
        </div>
      `;
    });
    document.querySelectorAll(".qty").forEach(input => input.addEventListener("input", calculateTotal));
    renderAdminList();
  }

  function calculateTotal() {
    let total = 0;
    document.querySelectorAll(".qty").forEach(input => {
      const index = input.dataset.index;
      total += vegetables[index].price * Number(input.value);
    });
    document.getElementById("total").textContent = `合計：${total}円`;
  }

  /* --- 管理者機能 --- */
  document.getElementById("adminBtn").addEventListener("click", () => {
    if (prompt("パスワードを入力") === "admin123") {
      document.getElementById("adminPanel").style.display = "block";
    }
  });

  document.getElementById("addBtn").addEventListener("click", () => {
    const name = document.getElementById("newName").value;
    const price = Number(document.getElementById("newPrice").value);
    const stock = Number(document.getElementById("newStock").value);
    if (!name || !newImageBase64) return alert("名前と画像は必須です");
    vegetables.push({ name, price, stock, image: newImageBase64 });
    saveData();
    alert("追加しました！");
  });

  // （※リサイズ処理や削除処理など以前の機能をすべて含んでいます）
  // 以前の setupDropArea などの共通関数はここに継続されます
</script>
</body>
</html>
